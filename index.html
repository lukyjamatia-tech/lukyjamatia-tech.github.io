<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FindBack S1 — Find What The World Lost</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --card: #1a1a24;
      --border: #2a2a3a;
      --accent: #f0a500;
      --accent2: #e05c2a;
      --text: #f0ede8;
      --muted: #7a7a9a;
      --green: #2adb7a;
      --red: #e05c2a;
      --blue: #3a8ef0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* HEADER */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.4rem;
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--accent); }
    .header-tag {
      font-size: 0.65rem;
      background: var(--accent);
      color: #000;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    /* HERO */
    .hero {
      padding: 28px 18px 20px;
      background: linear-gradient(160deg, #13131a 0%, #0d0d16 100%);
      border-bottom: 1px solid var(--border);
    }
    .hero h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.9rem;
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 6px;
    }
    .hero h1 em { color: var(--accent); font-style: normal; }
    .hero p { color: var(--muted); font-size: 0.9rem; margin-bottom: 18px; }

    /* STATS */
    .stats {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
    }
    .stat-box {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 8px;
      text-align: center;
    }
    .stat-num {
      font-family: 'Syne', sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--accent);
    }
    .stat-label { font-size: 0.65rem; color: var(--muted); margin-top: 2px; }

    /* POST BUTTONS */
    .post-buttons {
      display: flex;
      gap: 10px;
    }
    .btn {
      flex: 1;
      padding: 13px 10px;
      border-radius: 12px;
      border: none;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn:active { transform: scale(0.97); opacity: 0.85; }
    .btn-lost { background: var(--accent2); color: #fff; }
    .btn-found { background: var(--green); color: #000; }
    .btn-missing { background: var(--blue); color: #fff; }
    .btn-missing { font-size: 0.78rem; }

    /* FILTERS */
    .filters {
      padding: 14px 18px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      border-bottom: 1px solid var(--border);
    }
    .filters::-webkit-scrollbar { display: none; }
    .filter-btn {
      white-space: nowrap;
      padding: 7px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
    }
    .filter-btn.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
      font-weight: 600;
    }

    /* LISTINGS */
    .listings-header {
      padding: 16px 18px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .listings-header h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
    }
    .listings-count {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .listings-grid {
      padding: 0 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      position: relative;
      overflow: hidden;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
    }
    .card.lost::before { background: var(--accent2); }
    .card.found::before { background: var(--green); }
    .card.missing::before { background: var(--blue); }

    .card-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.8px;
      padding: 3px 9px;
      border-radius: 20px;
      margin-bottom: 10px;
    }
    .badge-lost { background: rgba(224,92,42,0.15); color: var(--accent2); }
    .badge-found { background: rgba(42,219,122,0.12); color: var(--green); }
    .badge-missing { background: rgba(58,142,240,0.12); color: var(--blue); }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 5px;
    }
    .card-desc {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 12px;
    }
    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--muted);
    }
    .card-location { display: flex; align-items: center; gap: 4px; }
    .card-actions { display: flex; gap: 8px; }
    .action-btn {
      padding: 7px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 0.78rem;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
    }
    .action-btn:active { transform: scale(0.96); }
    .action-btn.call { background: var(--green); color: #000; border-color: var(--green); font-weight: 600; }
    .action-btn.whatsapp { background: #25D366; color: #fff; border-color: #25D366; font-weight: 600; }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }
    .empty-icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state h3 { font-family: 'Syne', sans-serif; color: var(--text); margin-bottom: 6px; }

    /* LOADING */
    .loading {
      text-align: center;
      padding: 30px;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .spinner {
      width: 30px; height: 30px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* MODAL OVERLAY */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      padding: 24px 20px 36px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-handle {
      width: 40px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 20px;
    }
    .modal-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.2rem;
      font-weight: 800;
      margin-bottom: 20px;
    }

    .form-group { margin-bottom: 14px; }
    .form-label {
      display: block;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 500;
    }
    .form-input, .form-textarea, .form-select {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus, .form-textarea:focus, .form-select:focus {
      border-color: var(--accent);
    }
    .form-textarea { height: 90px; resize: none; }
    .form-select option { background: var(--card); }

    .submit-btn {
      width: 100%;
      padding: 15px;
      border-radius: 12px;
      border: none;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .submit-lost { background: var(--accent2); color: #fff; }
    .submit-found { background: var(--green); color: #000; }
    .submit-missing { background: var(--blue); color: #fff; }

    .close-modal {
      position: absolute;
      top: 16px; right: 20px;
      background: var(--card);
      border: none;
      color: var(--muted);
      font-size: 1.2rem;
      width: 32px; height: 32px;
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--green);
      color: #000;
      padding: 12px 24px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.9rem;
      z-index: 300;
      opacity: 0;
      transition: all 0.3s;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.error { background: var(--accent2); color: #fff; }

    /* BOTTOM NAV */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 100;
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 0 14px;
      cursor: pointer;
      color: var(--muted);
      font-size: 0.65rem;
      gap: 4px;
      transition: color 0.15s;
      border: none;
      background: none;
    }
    .nav-item.active { color: var(--accent); }
    .nav-icon { font-size: 1.3rem; }

    /* ONLINE BADGE */
    .online-dot {
      width: 8px; height: 8px;
      background: var(--green);
      border-radius: 50%;
      display: inline-block;
      margin-right: 4px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">Find<span>Back</span></div>
  <div style="display:flex;align-items:center;gap:8px;">
    <span style="font-size:0.75rem;color:var(--muted);"><span class="online-dot"></span>Live</span>
    <span class="header-tag">S1</span>
  </div>
</header>

<!-- HERO -->
<div class="hero">

  <div class="stats">

<div class="listings-header">

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal" style="position:relative;">
    <div class="modal-handle"></div>
    <button class="close-modal" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modal-title">Post Item</div>

    <div class="form-group">

        <option value="documents">📄 Documents / ID</option>
        <option value="bag">🎒 Bag / Luggage</option>
        <option value="jewelry">💍 Jewelry</option>
        <option value="vehicle">🚗 Vehicle</option>
        <option value="person">👤 Person</option>
        <option value="animal">🐾 Animal / Pet</option>
        <option value="other">📦 Other</option>

    <div class="form-group">
      <label class="form-label">Description *</label>
      <textarea class="form-textarea" id="f-desc" placeholder="Describe the item — color, brand, any unique marks..."></textarea>

      <label class="form-label">Location *</label>

    </div>
    <div class="form-group">
      <label class="form-label">Contact Number *</label>
      <input class="form-input" id="f-phone" type="tel" placeholder="10-digit mobile number" maxlength="10" />
    </div>
    <div class="form-group">
      <label class="form-label">Reward (optional)</label>
      <input class="form-input" id="f-reward" placeholder="e.g. ₹500 reward" />

    <button class="submit-btn" id="submit-btn" onclick="submitPost()">Submit Post</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-item active">
    <span class="nav-icon">🏠</span>
    Home
  </button>
  <button class="nav-item" onclick="openModal('lost')">
    <span class="nav-icon">🔴</span>
    Lost
  </button>
  <button class="nav-item" onclick="openModal('found')">
    <span class="nav-icon">🟢</span>
    Found
  </button>
  <button class="nav-item" onclick="openModal('missing')">
    <span class="nav-icon">🔵</span>
    Missing
  </button>
  <button class="nav-item">
    <span class="nav-icon">ℹ️</span>
    About
  </button>
</nav>

<!-- FIREBASE SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCH1s6Cf2Zx2CZVv5HUUu2P7TwHEqoxWW8",
    authDomain: "findback-app-34e4f.firebaseapp.com",
    projectId: "findback-app-34e4f",
    storageBucket: "findback-app-34e4f.firebasestorage.app",
    messagingSenderId: "504207496092",
    appId: "1:504207496092:web:b9d6918639ed23ddad6e59",
    measurementId: "G-4LQX64BLC9"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Global state
  window._db = db;
  window._addDoc = addDoc;
  window._collection = collection;
  window._serverTimestamp = serverTimestamp;
  window._allPosts = [];
  window._currentFilter = 'all';
  window._currentType = 'lost';

  // Real-time listener
  const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
  onSnapshot(q, (snapshot) => {
    window._allPosts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    renderPosts();
    updateStats();
  }, (err) => {
    document.getElementById('listings-grid').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <h3>Connection Error</h3>
        <p style="font-size:0.8rem;margin-top:6px;">Firebase se connect nahi ho paya. Firestore rules check karo.</p>
      </div>`;
    document.getElementById('listings-count').textContent = 'Error';
  });
</script>

<script>
  // ── MODAL ──
  function openModal(type) {
    window._currentType = type;
    const titles = { lost: '🔴 Report Lost Item', found: '🟢 Report Found Item', missing: '🔵 Report Missing Person' };
    const colors = { lost: 'submit-lost', found: 'submit-found', missing: 'submit-missing' };
    document.getElementById('modal-title').textContent = titles[type];
    const btn = document.getElementById('submit-btn');
    btn.className = 'submit-btn ' + colors[type];
    btn.textContent = 'Submit Post';
    document.getElementById('modal-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    document.body.style.overflow = '';
  }
  function closeModalOutside(e) {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  }

  // ── SUBMIT ──
  async function submitPost() {
    const title = document.getElementById('f-title').value.trim();
    const desc = document.getElementById('f-desc').value.trim();
    const location = document.getElementById('f-location').value.trim();
    const phone = document.getElementById('f-phone').value.trim();
    const name = document.getElementById('f-name').value.trim();
    const reward = document.getElementById('f-reward').value.trim();
    const category = document.getElementById('f-category').value;

    if (!title) { showToast('Item name required!', true); return; }
    if (!desc) { showToast('Description required!', true); return; }
    if (!location) { showToast('Location required!', true); return; }
    if (!phone || phone.length !== 10) { showToast('Valid 10-digit number required!', true); return; }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Posting...';

    try {
      await window._addDoc(window._collection(window._db, 'posts'), {
        type: window._currentType,
        title, desc, location, phone, name, reward, category,
        createdAt: window._serverTimestamp()
      });

      // Clear form
      ['f-title','f-desc','f-location','f-phone','f-name','f-reward'].forEach(id => document.getElementById(id).value = '');
      closeModal();
      showToast('✅ Post submitted successfully!');
    } catch (err) {
      showToast('Error posting. Try again!', true);
      console.error(err);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Submit Post';
    }
  }
  window.submitPost = submitPost;

  // ── RENDER ──
  function renderPosts() {
    const grid = document.getElementById('listings-grid');
    let posts = window._allPosts;

    const f = window._currentFilter;
    if (f !== 'all') {
      if (['lost','found','missing'].includes(f)) {
        posts = posts.filter(p => p.type === f);
      } else {
        posts = posts.filter(p => p.category === f);
      }
    }

    document.getElementById('listings-count').textContent = posts.length + ' posts';

    if (posts.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🔍</div>
          <h3>No posts yet</h3>
          <p style="font-size:0.82rem;margin-top:6px;">Pehla post karo — koi zaroor help karega!</p>
        </div>`;
      return;
    }

    const typeEmoji = { lost: '🔴', found: '🟢', missing: '🔵' };
    const typeLabel = { lost: 'LOST', found: 'FOUND', missing: 'MISSING' };

    grid.innerHTML = posts.map(p => {
      const timeStr = p.createdAt ? timeAgo(p.createdAt.toDate()) : 'Just now';
      return `
        <div class="card ${p.type}">
          <span class="card-badge badge-${p.type}">${typeEmoji[p.type]} ${typeLabel[p.type]}</span>
          <div class="card-title">${escHtml(p.title)}</div>
          <div class="card-desc">${escHtml(p.desc)}${p.reward ? `<br/><strong style="color:var(--accent)">🏆 ${escHtml(p.reward)}</strong>` : ''}</div>
          <div class="card-meta">
            <span class="card-location">📍 ${escHtml(p.location)}</span>
            <span>${timeStr}</span>
          </div>
          <div class="card-actions" style="margin-top:12px;">
            <button class="action-btn call" onclick="callContact('${p.phone}')">📞 Call</button>
            <button class="action-btn whatsapp" onclick="whatsappContact('${p.phone}', '${escHtml(p.title)}')">💬 WhatsApp</button>
            ${p.name ? `<button class="action-btn" style="pointer-events:none;opacity:0.7;">👤 ${escHtml(p.name)}</button>` : ''}
          </div>
        </div>`;
    }).join('');
  }

  // ── STATS ──
  function updateStats() {
    const posts = window._allPosts;
    document.getElementById('stat-total').textContent = posts.length;
    document.getElementById('stat-lost').textContent = posts.filter(p => p.type === 'lost').length;
    document.getElementById('stat-found').textContent = posts.filter(p => p.type === 'found').length;
    document.getElementById('stat-missing').textContent = posts.filter(p => p.type === 'missing').length;
  }

  // ── FILTER ──
  function filterPosts(type, el) {
    window._currentFilter = type;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    renderPosts();
  }
  window.filterPosts = filterPosts;

  // ── CONTACT ──
  function callContact(phone) {
    window.location.href = 'tel:' + phone;
  }
  function whatsappContact(phone, title) {
    const msg = encodeURIComponent(`Hi! I saw your FindBack post about "${title}". Can we connect?`);
    window.open(`https://wa.me/91${phone}?text=${msg}`, '_blank');
  }
  window.callContact = callContact;
  window.whatsappContact = whatsappContact;
  window.openModal = openModal;
  window.closeModal = closeModal;
  window.closeModalOutside = closeModalOutside;

  // ── TOAST ──
  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => t.className = 'toast', 3000);
  }

  // ── HELPERS ──
  function timeAgo(date) {
    const diff = Math.floor((Date.now() - date) / 1000);
    if (diff < 60) return 'Just now';
    if (diff < 3600) return Math.floor(diff/60) + 'm ago';
    if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
    return Math.floor(diff/86400) + 'd ago';
  }
  function escHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
