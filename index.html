<!DOCTYPE html>
<html>
<head>
<title>FindBack</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
padding-bottom:80px;
}

nav{
background:#111;
color:white;
padding:15px;
font-size:20px;
}

.container{
padding:20px;
max-width:600px;
margin:auto;
}

input,textarea{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ddd;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#E8722A;
color:white;
font-weight:bold;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:10px;
border:1px solid #eee;
}

.delete{
background:red;
margin-top:10px;
}

.page{display:none}
.page.active{display:block}

.bottom{
position:fixed;
bottom:0;
width:100%;
background:white;
border-top:1px solid #eee;
display:flex;
justify-content:space-around;
padding:10px;
}

.bottom button{
background:none;
color:#555;
}

</style>

</head>

<body>

<nav>FindBack</nav>

<div class="container">

<div id="home" class="page active">

<h3>Recent Updates</h3>

<div id="posts"></div>

</div>

<div id="add" class="page">

<h3>Add Post</h3>

<input id="title" placeholder="Item name">

<textarea id="desc" placeholder="Description"></textarea>

<button onclick="addPost()">Post</button>

</div>

<div id="account" class="page">

<h3>Account</h3>

<input id="email" placeholder="Email">

<input id="pass" type="password" placeholder="Password">

<button onclick="register()">Register</button>

<button onclick="login()">Login</button>

<button onclick="logout()">Logout</button>

</div>

<div id="profile" class="page">

<h3>My Profile</h3>

<p id="profileEmail"></p>

<h4>My Posts</h4>

<div id="myPosts"></div>

</div>

</div>

<div class="bottom">

<button onclick="show('home')">Home</button>

<button onclick="show('add')">Add</button>

<button onclick="show('account')">Account</button>

<button onclick="show('profile')">Profile</button>

</div>

<script>

let user=null
let posts=[]

function show(p){

document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'))

document.getElementById(p).classList.add('active')

if(p==="profile"){
loadProfile()
}

}

function register(){

let email=document.getElementById('email').value
let pass=document.getElementById('pass').value

localStorage.setItem("email",email)
localStorage.setItem("pass",pass)

alert("Account created")

}

function login(){

let email=document.getElementById('email').value
let pass=document.getElementById('pass').value

if(email===localStorage.getItem("email") && pass===localStorage.getItem("pass")){

user=email

document.getElementById("profileEmail").innerText="Email: "+user

alert("Login success")

}else{

alert("Wrong login")

}

}

function logout(){

user=null

alert("Logout")

}

function addPost(){

if(!user){

alert("Login first")

return

}

let title=document.getElementById("title").value
let desc=document.getElementById("desc").value

posts.push({

title:title,
desc:desc,
owner:user

})

render()

}

function render(){

let html=""

posts.forEach((p,i)=>{

let del=""

if(p.owner===user){

del=`<button class="delete" onclick="del(${i})">Delete</button>`

}

html+=`

<div class="card">

<h4>${p.title}</h4>

<p>${p.desc}</p>

${del}

</div>

`

})

document.getElementById("posts").innerHTML=html

}

function loadProfile(){

let html=""

posts.forEach((p)=>{

if(p.owner===user){

html+=`

<div class="card">

<h4>${p.title}</h4>

<p>${p.desc}</p>

</div>

`

}

})

document.getElementById("myPosts").innerHTML=html

}

function del(i){

posts.splice(i,1)

render()

loadProfile()

}

</script>

</body>
</html>
