<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FindBack S1 — Find what the world lost</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #E8722A;
      --black: #111111;
      --white: #FFFFFF;
      --gray: #F5F5F5;
      --text-muted: #777;
      --border: #E0E0E0;
      --card-bg: #FFFFFF;
      --input-bg: #FFFFFF;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--white);
      color: var(--black);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background 0.4s, color 0.4s;
    }
    body.dark-mode {
      --orange: #FF9A5A;
      --black: #E0E0E0;
      --white: #1A1A1A;
      --gray: #2D2D2D;
      --text-muted: #AAAAAA;
      --border: #444444;
      --card-bg: #222222;
      --input-bg: #2A2A2A;
    }
    body.dark-mode nav { background: #0F0F0F; }
    body.dark-mode .modal-sheet,
    body.dark-mode .page-content,
    body.dark-mode .listing-card,
    body.dark-mode .auth-card { background: var(--card-bg); color: var(--black); }
    body.dark-mode input, body.dark-mode textarea, body.dark-mode select {
      background: var(--input-bg);
      color: var(--black);
      border-color: var(--border);
    }
    nav {
      background: var(--black);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-logo {
      font-family: 'Sora', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      cursor: pointer;
    }
    .nav-logo span { color: var(--orange); }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .live-badge { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #aaa; }
    .live-dot { width: 7px; height: 7px; background: #4CAF50; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .s1-badge {
      background: var(--black);
      border: 1px solid #444;
      color: var(--white);
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
    }
    .home-hero {
      background: var(--gray);
      padding: 60px 24px;
      text-align: center;
    }
    .home-hero .emoji { font-size: 56px; margin-bottom: 16px; }
    .home-hero h1 { font-family: 'Sora', sans-serif; font-size: 26px; font-weight: 700; margin-bottom: 8px; }
    .home-hero p { color: var(--text-muted); font-size: 15px; }
    .home-btns { display: flex; gap: 12px; justify-content: center; margin-top: 24px; flex-wrap: wrap; }
    .btn-primary {
      background: var(--orange);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: opacity .2s;
    }
    .btn-primary:hover { opacity: .88; }
    .btn-outline {
      background: transparent;
      color: var(--orange);
      border: 2px solid var(--orange);
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-outline:hover { background: var(--orange); color: white; }
    .page { display: none; flex: 1; flex-direction: column; }
    .page.active { display: flex; }
    .page-content { padding: 32px 24px; flex: 1; max-width: 680px; width: 100%; margin: 0 auto; }
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--black);
      color: white;
      padding: 12px 20px;
      border-radius: 24px;
      font-size: 13px;
      opacity: 0;
      transition: all .3s;
      z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 300;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-sheet {
      background: var(--white);
      border-radius: 20px 20px 0 0;
      padding: 24px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
    }
    body.dark-mode .modal-sheet { background: #222; color: #e0e0e0; }
    .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
    .modal-title { font-family: 'Sora', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .modal-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
    .alert-success {
      background: #D1FAE5;
      color: #065F46;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 14px;
      margin-bottom: 16px;
    }
    body.dark-mode .alert-success {
      background: #064E3B;
      color: #6EE7B7;
    }
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--white);
      border-top: 1px solid var(--border);
      display: flex;
      padding: 8px 0 14px;
      z-index: 200;
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      color: #aaa;
      font-size: 10px;
      font-weight: 500;
    }
    .nav-item.active { color: var(--orange); }
    #user-menu-container:hover #user-avatar { transform: scale(1.08); transition: 0.2s; }
    #user-dropdown button:hover { background: var(--gray); }
  </style>
</head>
<body>

<nav>
  <div class="nav-logo" onclick="showPage('home')">Find<span>Back</span></div>
  <div class="nav-right">
    <div class="live-badge"><div class="live-dot"></div> Live</div>
    <div class="s1-badge">S1</div>

    <button id="nav-login-top" class="btn-primary" style="padding:8px 16px; font-size:13px;" onclick="showPage('login')">Login</button>

    <div id="user-menu-container" style="position:relative; display:none; cursor:pointer;">
      <div id="user-avatar" style="width:36px;height:36px;border-radius:50%;background:var(--orange);color:white;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid white;">
        U
      </div>
      <div id="user-dropdown" style="display:none;position:absolute;top:45px;right:0;background:var(--white);border:1px solid var(--border);border-radius:10px;box-shadow:0 6px 16px rgba(0,0,0,0.15);min-width:180px;z-index:100;">
        <button onclick="loadProfile()" style="width:100%;padding:12px 16px;border:none;background:none;text-align:left;cursor:pointer;">👤 Profile</button>
        <button onclick="openSettingsModal()" style="width:100%;padding:12px 16px;border:none;background:none;text-align:left;cursor:pointer;">⚙️ Settings</button>
        <div style="height:1px;background:var(--border);margin:4px 0;"></div>
        <button onclick="doLogout()" style="width:100%;padding:12px 16px;border:none;background:none;text-align:left;cursor:pointer;color:#dc2626;">🚪 Logout</button>
      </div>
    </div>
  </div>
</nav>

<div class="toast" id="toast"></div>

<div class="page active" id="page-home">
  <div class="home-hero">
    <div class="emoji">🔍</div>
    <h1>Find what the world lost.</h1>
    <p>India's most trusted lost & found platform</p>
    <div class="home-btns">
      <button class="btn-primary" onclick="openModal('lost')">😟 Report Lost</button>
      <button class="btn-outline" onclick="openModal('found')">🎉 Report Found</button>
    </div>
  </div>
  <div class="page-content">
    <!-- Tumhara purana search bar, category grid, listings grid yahan paste kar lena -->
    <!-- Example placeholder -->
    <div id="listings-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;"></div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">⚙️ Settings</div>
    <div class="modal-sub">Customize your experience</div>

    <div style="padding:16px 0;">
      <div class="form-group">
        <label>🌙 Dark Mode</label>
        <select id="dark-mode-select" style="width:100%;padding:10px;border:1.5px solid var(--border);border-radius:10px;">
          <option value="system">System default</option>
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </div>
      <button class="btn-primary" style="width:100%;margin-top:16px;" onclick="saveSettings()">Save</button>
      <button class="btn-outline" style="width:100%;margin-top:8px;" onclick="closeSettingsModal()">Close</button>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-item active" id="nav-home" onclick="showPage('home')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Home
  </button>
  <button class="nav-item" id="nav-lost" onclick="openModal('lost')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    Lost
  </button>
  <button class="nav-item" id="nav-found" onclick="openModal('found')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    Found
  </button>
  <button class="nav-item" id="nav-login-btn" onclick="showPage('login')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    Login
  </button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, orderBy, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCH1s6Cf2Zx2CZVv5HUUu2P7TwHEqoxWW8",
    authDomain: "findback-app-34e4f.firebaseapp.com",
    projectId: "findback-app-34e4f",
    storageBucket: "findback-app-34e4f.firebasestorage.app",
    messagingSenderId: "504207496092",
    appId: "1:504207496092:web:b9d6918639ed23ddad6e59"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window._currentUser = null;
  window._allPosts = [];

  // =============================================
  // Dark Mode
  // =============================================
  function applyDarkMode(mode) {
    if (mode === 'dark') document.body.classList.add('dark-mode');
    else if (mode === 'light') document.body.classList.remove('dark-mode');
    else {
      if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.body.classList.add('dark-mode');
      else document.body.classList.remove('dark-mode');
    }
    localStorage.setItem('darkModePreference', mode);
  }

  const savedMode = localStorage.getItem('darkModePreference') || 'system';
  applyDarkMode(savedMode);

  // =============================================
  // Auth + Avatar + Dropdown
  // =============================================
  onAuthStateChanged(auth, (user) => {
    window._currentUser = user;
    const loginBtn = document.getElementById('nav-login-top');
    const menuContainer = document.getElementById('user-menu-container');
    const avatar = document.getElementById('user-avatar');

    if (user) {
      loginBtn.style.display = 'none';
      menuContainer.style.display = 'block';
      const name = user.displayName || 'User';
      avatar.textContent = name.charAt(0).toUpperCase();
    } else {
      loginBtn.style.display = 'block';
      menuContainer.style.display = 'none';
    }
  });

  window.toggleUserDropdown = function() {
    const dropdown = document.getElementById('user-dropdown');
    dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
  };

  document.addEventListener('click', e => {
    if (!document.getElementById('user-menu-container')?.contains(e.target)) {
      document.getElementById('user-dropdown').style.display = 'none';
    }
  });

  // =============================================
  // Settings Modal
  // =============================================
  window.openSettingsModal = function() {
    document.getElementById('settings-modal').classList.add('open');
  };

  window.closeSettingsModal = function() {
    document.getElementById('settings-modal').classList.remove('open');
  };

  window.saveSettings = function() {
    const darkMode = document.getElementById('dark-mode-select').value;
    applyDarkMode(darkMode);
    toast('⚙️ Settings saved!');
    closeSettingsModal();
  };

  // =============================================
  // Logout
  // =============================================
  window.doLogout = async function() {
    await signOut(auth);
    toast('👋 Logged out!');
    showPage('home');
  };

  // Toast
  window.toast = function(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  };

  // =============================================
  // Placeholder for your original functions
  // =============================================
  window.showPage = function(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + id).classList.add('active');
  };

  window.openModal = function(type) {
    toast('Opening ' + type + ' modal...');
    // Tumhara purana modal code yahan daal dena
  };

  // Your original Firebase post logic (real-time, submit, delete etc.) paste here
</script>

</body>
</html>
