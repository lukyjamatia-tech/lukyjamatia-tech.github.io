<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FindBack S1 – Find what the world lost</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Noto+Sans+Devanagari:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --primary: #FF6B35;
      --primary-dark: #e05520;
      --secondary: #1A1A2E;
      --accent: #FFD700;
      --bg: #F7F4EF;
      --card: #ffffff;
      --text: #1A1A2E;
      --muted: #7a7a8c;
      --border: #e0dbd4;
      --success: #2ECC71;
      --danger: #E74C3C;
      --radius: 16px;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Baloo 2', 'Noto Sans Devanagari', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* HEADER */
    header {
      background: var(--secondary);
      color: #fff;
      padding: 18px 20px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
    }
    .logo { font-size: 1.5rem; font-weight: 800; letter-spacing: -1px; }
    .logo span { color: var(--primary); }
    .tagline { font-size: 0.72rem; color: #aaa; letter-spacing: 1px; }
    .header-actions button {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-family: inherit;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .header-actions button:hover { background: var(--primary-dark); }

    /* STATS BAR */
    .stats-bar {
      background: var(--primary);
      color: #fff;
      display: flex;
      justify-content: space-around;
      padding: 10px 0 8px;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .stats-bar span em { font-style: normal; font-size: 1.1rem; font-weight: 800; }

    /* FILTERS */
    .filters {
      display: flex;
      gap: 8px;
      padding: 14px 16px 10px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .filters::-webkit-scrollbar { display: none; }
    .filter-btn {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 24px;
      padding: 6px 18px;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
      color: var(--text);
    }
    .filter-btn.active, .filter-btn:hover {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    /* LISTINGS GRID */
    .listings {
      padding: 8px 14px 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.18s, box-shadow 0.18s;
      border: 1.5px solid var(--border);
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 8px 32px rgba(0,0,0,0.13); }
    .card-img {
      width: 100%; height: 130px; object-fit: cover;
      background: linear-gradient(135deg, #f0ece6 60%, #e0dbd4);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.8rem;
      position: relative;
    }
    .card-img img { width: 100%; height: 130px; object-fit: cover; display: block; }
    .card-img .no-photo { font-size: 2.5rem; color: #ccc; }
    .badge {
      position: absolute; top: 8px; left: 8px;
      border-radius: 6px; padding: 2px 10px;
      font-size: 0.72rem; font-weight: 800; letter-spacing: 1px;
      text-transform: uppercase;
    }
    .badge.lost { background: var(--danger); color: #fff; }
    .badge.found { background: var(--success); color: #fff; }
    .badge.missing { background: var(--accent); color: #333; }
    .card-body { padding: 10px 12px 12px; }
    .card-title { font-size: 0.95rem; font-weight: 700; margin-bottom: 3px; line-height: 1.3; }
    .card-meta { font-size: 0.78rem; color: var(--muted); margin-bottom: 6px; }
    .card-desc { font-size: 0.8rem; color: #555; line-height: 1.4; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-actions { display: flex; gap: 6px; }
    .btn-call, .btn-whatsapp {
      flex: 1; border: none; border-radius: 8px;
      padding: 6px 0; font-family: inherit; font-size: 0.78rem; font-weight: 700;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-call { background: var(--secondary); color: #fff; }
    .btn-call:hover { background: #2d2d4e; }
    .btn-whatsapp { background: #25D366; color: #fff; }
    .btn-whatsapp:hover { background: #1ebe5b; }

    /* MODAL OVERLAY */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.55);
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--card);
      border-radius: 24px 24px 0 0;
      width: 100%; max-width: 520px;
      max-height: 92vh;
      overflow-y: auto;
      padding: 24px 20px 32px;
      animation: slideUp 0.32s cubic-bezier(.22,1,.36,1);
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 18px;
    }
    .modal-title { font-size: 1.25rem; font-weight: 800; }
    .modal-close {
      background: var(--bg); border: none; border-radius: 50%;
      width: 34px; height: 34px; font-size: 1.2rem; cursor: pointer; color: var(--text);
      display: flex; align-items: center; justify-content: center;
    }

    /* TYPE SELECTOR */
    .type-selector {
      display: flex; gap: 8px; margin-bottom: 18px;
    }
    .type-btn {
      flex: 1; padding: 9px 0; border-radius: 10px; border: 2px solid var(--border);
      font-family: inherit; font-size: 0.88rem; font-weight: 700; cursor: pointer;
      background: var(--bg); color: var(--muted); transition: all 0.18s;
    }
    .type-btn.selected-lost { background: var(--danger); border-color: var(--danger); color: #fff; }
    .type-btn.selected-found { background: var(--success); border-color: var(--success); color: #fff; }
    .type-btn.selected-missing { background: var(--accent); border-color: var(--accent); color: #333; }

    /* FORM */
    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block; font-size: 0.82rem; font-weight: 700;
      color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; padding: 11px 14px;
      border: 2px solid var(--border); border-radius: 10px;
      font-family: inherit; font-size: 0.92rem; background: var(--bg);
      color: var(--text); outline: none; transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
      border-color: var(--primary);
    }
    .form-group textarea { resize: vertical; min-height: 70px; }

    /* PHOTO UPLOAD */
    .photo-upload-area {
      border: 2.5px dashed var(--border);
      border-radius: 12px;
      padding: 18px 12px;
      text-align: center;
      cursor: pointer;
      background: var(--bg);
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    .photo-upload-area:hover, .photo-upload-area.dragover {
      border-color: var(--primary);
      background: #fff5f0;
    }
    .photo-upload-area input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .upload-icon { font-size: 2rem; margin-bottom: 6px; }
    .upload-text { font-size: 0.88rem; font-weight: 600; color: var(--muted); }
    .upload-hint { font-size: 0.75rem; color: #aaa; margin-top: 3px; }

    /* PHOTO PREVIEW */
    .photo-preview-grid {
      display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px;
    }
    .photo-preview-item {
      position: relative; width: 72px; height: 72px;
      border-radius: 10px; overflow: hidden; border: 2px solid var(--border);
    }
    .photo-preview-item img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .photo-remove {
      position: absolute; top: 2px; right: 2px;
      background: rgba(0,0,0,0.6); color: #fff;
      border: none; border-radius: 50%; width: 20px; height: 20px;
      font-size: 0.7rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }

    /* SUBMIT BTN */
    .btn-submit {
      width: 100%; padding: 14px;
      background: var(--primary); color: #fff;
      border: none; border-radius: 12px;
      font-family: inherit; font-size: 1.05rem; font-weight: 800;
      cursor: pointer; margin-top: 8px; transition: background 0.2s;
      letter-spacing: 0.5px;
    }
    .btn-submit:hover { background: var(--primary-dark); }

    /* BOTTOM NAV */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--secondary);
      display: flex; justify-content: space-around;
      padding: 10px 0 14px;
      z-index: 100;
      box-shadow: 0 -2px 16px rgba(0,0,0,0.18);
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center;
      color: #888; font-size: 0.68rem; font-weight: 600;
      cursor: pointer; gap: 3px; transition: color 0.2s;
      background: none; border: none; font-family: inherit;
    }
    .nav-item .nav-icon { font-size: 1.35rem; }
    .nav-item.active, .nav-item:hover { color: var(--primary); }
    .nav-item.post-btn {
      background: var(--primary); color: #fff;
      border-radius: 14px; padding: 6px 22px;
      margin-top: -14px;
      box-shadow: 0 4px 16px rgba(255,107,53,0.45);
    }
    .nav-item.post-btn:hover { background: var(--primary-dark); color: #fff; }

    /* TOAST */
    .toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      background: var(--secondary); color: #fff;
      padding: 10px 24px; border-radius: 24px;
      font-size: 0.9rem; font-weight: 600;
      z-index: 300; opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    /* EMPTY STATE */
    .empty-state {
      text-align: center; padding: 40px 20px; grid-column: 1/-1; color: var(--muted);
    }
    .empty-state .big-icon { font-size: 3rem; margin-bottom: 10px; }

    @media (min-width: 480px) {
      .listings { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div>
    <div class="logo">Find<span>Back</span> <span style="font-size:0.75rem;color:#aaa;font-weight:400;">S1</span></div>
    <div class="tagline">Find what the world lost</div>
  </div>
  <div class="header-actions">
    <button onclick="openModal()">+ Post</button>
  </div>
</header>

<!-- STATS BAR -->
<div class="stats-bar">
  <span>🔴 Lost <em id="statLost">0</em></span>
  <span>🟢 Found <em id="statFound">0</em></span>
  <span>🟡 Missing <em id="statMissing">0</em></span>
</div>

<!-- FILTERS -->
<div class="filters">
  <button class="filter-btn active" onclick="filterPosts('all', this)">All</button>
  <button class="filter-btn" onclick="filterPosts('lost', this)">Lost</button>
  <button class="filter-btn" onclick="filterPosts('found', this)">Found</button>
  <button class="filter-btn" onclick="filterPosts('missing', this)">Missing Person</button>
</div>

<!-- LISTINGS -->
<div class="listings" id="listings">
  <div class="empty-state">
    <div class="big-icon">🔍</div>
    <div style="font-weight:700;margin-bottom:4px;">Abhi koi post nahi hai</div>
    <div style="font-size:0.82rem;">Pehle post karne ke liye "+" button dabao</div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title">Nayi Post Banao</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <!-- TYPE SELECTOR -->
    <div class="type-selector">
      <button class="type-btn" id="typeLost" onclick="selectType('lost')">🔴 Lost</button>
      <button class="type-btn" id="typeFound" onclick="selectType('found')">🟢 Found</button>
      <button class="type-btn" id="typeMissing" onclick="selectType('missing')">🟡 Missing</button>
    </div>

    <!-- FORM -->
    <div class="form-group">
      <label>Title / Naam *</label>
      <input type="text" id="fTitle" placeholder="Jैse: Kala wallet, Billi, Nokia phone..." />
    </div>
    <div class="form-group">
      <label>Category</label>
      <select id="fCategory">
        <option value="">-- Select --</option>
        <option>📱 Phone / Electronics</option>
        <option>👜 Bag / Wallet</option>
        <option>🔑 Keys</option>
        <option>🐾 Pet / Animal</option>
        <option>👤 Missing Person</option>
        <option>📄 Documents</option>
        <option>💍 Jewellery</option>
        <option>🚲 Vehicle</option>
        <option>👕 Clothes</option>
        <option>🎒 Other</option>
      </select>
    </div>
    <div class="form-group">
      <label>Location / Jagah *</label>
      <input type="text" id="fLocation" placeholder="Jैse: Lal Chowk, Srinagar..." />
    </div>
    <div class="form-group">
      <label>Description / Vivaran</label>
      <textarea id="fDesc" placeholder="Cheez ka rang, size, koi pehchaan..."></textarea>
    </div>

    <!-- PHOTO UPLOAD -->
    <div class="form-group">
      <label>📷 Photo Upload Karo (optional)</label>
      <div class="photo-upload-area" id="uploadArea">
        <input type="file" id="photoInput" accept="image/*" multiple onchange="handlePhotoSelect(event)" />
        <div class="upload-icon">📷</div>
        <div class="upload-text">Photo select karo ya yahan drop karo</div>
        <div class="upload-hint">Max 3 photos • JPG, PNG • 50KB each</div>
      </div>
      <div class="photo-preview-grid" id="photoPreviewGrid"></div>
    </div>

    <div class="form-group">
      <label>Contact Number *</label>
      <input type="tel" id="fContact" placeholder="+91 XXXXX XXXXX" />
    </div>
    <div class="form-group">
      <label>WhatsApp Number (optional)</label>
      <input type="tel" id="fWhatsapp" placeholder="+91 XXXXX XXXXX" />
    </div>

    <button class="btn-submit" onclick="submitPost()">✅ Post Karo</button>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-item active">
    <span class="nav-icon">🏠</span>Home
  </button>
  <button class="nav-item">
    <span class="nav-icon">🔍</span>Search
  </button>
  <button class="nav-item post-btn" onclick="openModal()">
    <span class="nav-icon">＋</span>Post
  </button>
  <button class="nav-item">
    <span class="nav-icon">🔔</span>Alerts
  </button>
  <button class="nav-item">
    <span class="nav-icon">👤</span>Profile
  </button>
</nav>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  let posts = [];
  let selectedType = '';
  let selectedPhotos = []; // stores { dataUrl, file }
  let currentFilter = 'all';

  function openModal() {
    document.getElementById('modalOverlay').classList.add('open');
    selectedType = '';
    selectedPhotos = [];
    renderPhotoPreviews();
    ['typeLost','typeFound','typeMissing'].forEach(id => {
      document.getElementById(id).className = 'type-btn';
    });
    ['fTitle','fLocation','fDesc','fContact','fWhatsapp'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('fCategory').selectedIndex = 0;
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  }

  function selectType(type) {
    selectedType = type;
    ['typeLost','typeFound','typeMissing'].forEach(id => {
      document.getElementById(id).className = 'type-btn';
    });
    const map = { lost: 'typeLost', found: 'typeFound', missing: 'typeMissing' };
    document.getElementById(map[type]).className = `type-btn selected-${type}`;
  }

  // PHOTO HANDLING
  function handlePhotoSelect(e) {
    const files = Array.from(e.target.files);
    const remaining = 3 - selectedPhotos.length;
    const toAdd = files.slice(0, remaining);
    toAdd.forEach(file => {
      if (!file.type.startsWith('image/')) return;
      if (file.size > 50 * 1024) { showToast('❌ Photo 50KB se chhoti honi chahiye'); return; }
      const reader = new FileReader();
      reader.onload = ev => {
        selectedPhotos.push({ dataUrl: ev.target.result, name: file.name });
        renderPhotoPreviews();
      };
      reader.readAsDataURL(file);
    });
    if (files.length > remaining) showToast('⚠️ Max 3 photos allowed');
    e.target.value = '';
  }

  function removePhoto(index) {
    selectedPhotos.splice(index, 1);
    renderPhotoPreviews();
  }

  function renderPhotoPreviews() {
    const grid = document.getElementById('photoPreviewGrid');
    grid.innerHTML = '';
    selectedPhotos.forEach((photo, i) => {
      const div = document.createElement('div');
      div.className = 'photo-preview-item';
      div.innerHTML = `
        <img src="${photo.dataUrl}" alt="photo ${i+1}" />
        <button class="photo-remove" onclick="removePhoto(${i})">✕</button>
      `;
      grid.appendChild(div);
    });
  }

  // DRAG & DROP
  const uploadArea = document.getElementById('uploadArea');
  uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
  uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
  uploadArea.addEventListener('drop', e => {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
    const remaining = 3 - selectedPhotos.length;
    files.slice(0, remaining).forEach(file => {
      const reader = new FileReader();
      reader.onload = ev => {
        selectedPhotos.push({ dataUrl: ev.target.result, name: file.name });
        renderPhotoPreviews();
      };
      reader.readAsDataURL(file);
    });
  });

  function submitPost() {
    const title = document.getElementById('fTitle').value.trim();
    const location = document.getElementById('fLocation').value.trim();
    const contact = document.getElementById('fContact').value.trim();
    const desc = document.getElementById('fDesc').value.trim();
    const category = document.getElementById('fCategory').value;
    const whatsapp = document.getElementById('fWhatsapp').value.trim();

    if (!selectedType) { showToast('⚠️ Type chuniye: Lost / Found / Missing'); return; }
    if (!title) { showToast('⚠️ Title zaruri hai'); return; }
    if (!location) { showToast('⚠️ Location zaruri hai'); return; }
    if (!contact) { showToast('⚠️ Contact number zaruri hai'); return; }

    const post = {
      id: Date.now(),
      type: selectedType,
      title, location, contact, desc, category, whatsapp,
      photos: selectedPhotos.map(p => p.dataUrl),
      time: new Date().toLocaleString('hi-IN')
    };

    posts.unshift(post);
    updateStats();
    renderListings(currentFilter);
    closeModal();
    showToast('✅ Post ho gaya!');
  }

  function updateStats() {
    document.getElementById('statLost').textContent = posts.filter(p => p.type === 'lost').length;
    document.getElementById('statFound').textContent = posts.filter(p => p.type === 'found').length;
    document.getElementById('statMissing').textContent = posts.filter(p => p.type === 'missing').length;
  }

  function filterPosts(type, btn) {
    currentFilter = type;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderListings(type);
  }

  function renderListings(filter) {
    const container = document.getElementById('listings');
    const filtered = filter === 'all' ? posts : posts.filter(p => p.type === filter);

    if (filtered.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="big-icon">🔍</div>
          <div style="font-weight:700;margin-bottom:4px;">Koi post nahi mili</div>
          <div style="font-size:0.82rem;">Abhi post karo!</div>
        </div>`;
      return;
    }

    container.innerHTML = filtered.map(post => {
      const badgeClass = post.type;
      const badgeText = post.type === 'lost' ? 'LOST' : post.type === 'found' ? 'FOUND' : 'MISSING';
      const photoHTML = post.photos && post.photos.length > 0
        ? `<img src="${post.photos[0]}" alt="photo" />`
        : `<span class="no-photo">${post.type === 'missing' ? '👤' : post.type === 'found' ? '🟢' : '🔴'}</span>`;
      const wa = post.whatsapp || post.contact;
      return `
        <div class="card">
          <div class="card-img">
            ${photoHTML}
            <span class="badge ${badgeClass}">${badgeText}</span>
          </div>
          <div class="card-body">
            <div class="card-title">${post.title}</div>
            <div class="card-meta">📍 ${post.location}</div>
            ${post.desc ? `<div class="card-desc">${post.desc}</div>` : ''}
            <div class="card-actions">
              <button class="btn-call" onclick="callContact('${post.contact}')">📞 Call</button>
              <button class="btn-whatsapp" onclick="whatsappContact('${wa}', '${post.title}')">💬 WA</button>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  function callContact(number) {
    window.location.href = `tel:${number}`;
  }

  function whatsappContact(number, title) {
    const clean = number.replace(/\D/g, '');
    const msg = encodeURIComponent(`Hello! Maine FindBack S1 pe aapka post dekha: "${title}". Kya aap mujhse baat kar sakte hain?`);
    window.open(`https://wa.me/${clean}?text=${msg}`, '_blank');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }
