<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FindBack S1 — Find what the world lost</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* Sab style purana waisa hi rakha hai – koi change nahi */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #E8722A;
      --black: #111111;
      --white: #FFFFFF;
      --gray: #F5F5F5;
      --text-muted: #777;
      --border: #E0E0E0;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--white);
      color: var(--black);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    nav {
      background: var(--black);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-logo {
      font-family: 'Sora', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      cursor: pointer;
    }
    .nav-logo span { color: var(--orange); }
    .nav-right { display: flex; align-items: center; gap: 10px; }
    .live-badge { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #aaa; }
    .live-dot { width: 7px; height: 7px; background: #4CAF50; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .s1-badge {
      background: var(--black);
      border: 1px solid #444;
      color: var(--white);
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
    }
    .page { display: none; flex: 1; flex-direction: column; }
    .page.active { display: flex; }
    .home-hero { background: var(--gray); padding: 60px 24px; text-align: center; }
    .home-hero .emoji { font-size: 56px; margin-bottom: 16px; }
    .home-hero h1 { font-family: 'Sora', sans-serif; font-size: 26px; font-weight: 700; margin-bottom: 8px; }
    .home-hero p { color: var(--text-muted); font-size: 15px; }
    .home-btns { display: flex; gap: 12px; justify-content: center; margin-top: 24px; flex-wrap: wrap; }
    .btn-primary {
      background: var(--orange);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: opacity .2s;
    }
    .btn-primary:hover { opacity: .88; }
    .btn-outline {
      background: transparent;
      color: var(--orange);
      border: 2px solid var(--orange);
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-outline:hover { background: var(--orange); color: white; }
    .page-content { padding: 32px 24px; flex: 1; max-width: 680px; width: 100%; margin: 0 auto; }
    .page-title { font-family: 'Sora', sans-serif; font-size: 24px; font-weight: 700; margin-bottom: 6px; }
    .page-subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 28px; }
    .divider { height: 1px; background: var(--border); margin: 24px 0; }
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--black);
      color: white;
      padding: 12px 20px;
      border-radius: 24px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: all .3s;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    /* Baaki styles same rahegi – space ke liye yahan short kiya */
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo" onclick="showPage('home')">Find<span>Back</span></div>
  <div class="nav-right">
    <div class="live-badge"><div class="live-dot"></div> Live</div>
    <div class="s1-badge">S1</div>
  </div>
</nav>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- HOME PAGE (baaki pages ke liye space bachaya – original code se copy kar lena) -->
<div class="page active" id="page-home">
  <div class="home-hero">
    <div class="emoji">🔍</div>
    <h1>Find what the world lost.</h1>
    <p>India's most trusted lost & found platform</p>
    <div class="home-btns">
      <button class="btn-primary" onclick="openModal('lost')">😟 Report Lost</button>
      <button class="btn-outline" onclick="openModal('found')">🎉 Report Found</button>
    </div>
  </div>
  <div class="page-content">
    <!-- Search + Category grid + Listings same rahegi -->
  </div>
</div>

<!-- LOGIN PAGE -->
<div class="page" id="page-login">
  <div class="page-content" style="display:flex; flex-direction:column; justify-content:center; min-height:calc(100vh - 120px);">
    <div style="margin-bottom:16px; cursor:pointer; color:var(--text-muted); font-size:13px;" onclick="showPage('home')">← Back</div>
    <div class="auth-card">
      <div class="auth-logo">
        <div class="brand">Find<span>Back</span> S1</div>
        <div style="font-size:13px; color:var(--text-muted); margin-top:4px;">Welcome back 👋</div>
      </div>
      <div id="login-success" class="alert-success">✅ Logged in successfully!</div>
      <div class="form-group">
        <label>📱 Email or Phone</label>
        <div class="input-icon-wrap">
          <span class="icon">📱</span>
          <input type="text" id="l-email" placeholder="Enter email or phone">
        </div>
      </div>
      <div class="form-group">
        <label>🔒 Password</label>
        <div class="input-icon-wrap">
          <span class="icon">🔒</span>
          <input type="password" id="l-pass" placeholder="Enter password">
        </div>
      </div>
      <button class="btn-primary" style="width:100%" onclick="doLogin()">Log In</button>
    </div>
  </div>
</div>

<!-- REGISTER PAGE -->
<div class="page" id="page-register">
  <div class="page-content" style="display:flex; flex-direction:column; justify-content:center; min-height:calc(100vh - 120px);">
    <div style="margin-bottom:16px; cursor:pointer; color:var(--text-muted); font-size:13px;" onclick="showPage('home')">← Back</div>
    <div class="auth-card">
      <div class="auth-logo">
        <div class="brand">Find<span>Back</span> S1</div>
        <div style="font-size:13px; color:var(--text-muted); margin-top:4px;">Create your free account</div>
      </div>
      <div id="reg-success" class="alert-success">✅ Account created! Welcome to FindBack!</div>
      <div class="form-group">
        <label>👤 Full Name</label>
        <div class="input-icon-wrap">
          <span class="icon">👤</span>
          <input type="text" id="r-name" placeholder="Your full name">
        </div>
      </div>
      <div class="form-group">
        <label>📧 Email Address</label>
        <div class="input-icon-wrap">
          <span class="icon">📧</span>
          <input type="email" id="r-email" placeholder="your@email.com">
        </div>
      </div>
      <div class="form-group">
        <label>🔒 Password</label>
        <div class="input-icon-wrap">
          <span class="icon">🔒</span>
          <input type="password" id="r-pass" placeholder="Create a strong password">
        </div>
      </div>
      <div class="form-check">
        <input type="checkbox" id="r-agree">
        <label for="r-agree">I agree to the <span style="color:var(--orange);cursor:pointer;">Terms</span></label>
      </div>
      <button class="btn-primary" style="width:100%" onclick="doRegister()">Create Account</button>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-item active" id="nav-home" onclick="showPage('home')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Home
  </button>
  <!-- baaki nav items same -->
  <button class="nav-item" id="nav-login-btn" onclick="showPage('login')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span class="nav-label">Login</span>
  </button>
  <button class="nav-item" id="nav-profile-btn" style="display:none;" onclick="loadProfile()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span class="nav-label">Profile</span>
  </button>
</div>

<!-- Firebase + Logic -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, orderBy, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCH1s6Cf2Zx2CZVv5HUUu2P7TwHEqoxWW8",
    authDomain: "findback-app-34e4f.firebaseapp.com",
    projectId: "findback-app-34e4f",
    storageBucket: "findback-app-34e4f.firebasestorage.app",
    messagingSenderId: "504207496092",
    appId: "1:504207496092:web:b9d6918639ed23ddad6e59"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window._currentUser = null;

  // Auth state
  onAuthStateChanged(auth, (user) => {
    window._currentUser = user;
    const loginBtn = document.getElementById('nav-login-btn');
    const profileBtn = document.getElementById('nav-profile-btn');
    if (user) {
      loginBtn.style.display = 'none';
      profileBtn.style.display = 'flex';
    } else {
      loginBtn.style.display = 'flex';
      profileBtn.style.display = 'none';
    }
  });

  // Toast
  window.toast = function(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  };

  // Login
  window.doLogin = async function() {
    const email = document.getElementById('l-email')?.value?.trim();
    const pass = document.getElementById('l-pass')?.value?.trim();
    if (!email || !pass) return toast('⚠️ Email aur password daalo');
    try {
      await signInWithEmailAndPassword(auth, email, pass);
      toast('✅ Login successful!');
      setTimeout(() => showPage('home'), 1200);
    } catch (e) {
      toast('❌ ' + (e.code.includes('credential') ? 'Galat email ya password' : 'Login failed'));
    }
  };

  // Register
  window.doRegister = async function() {
    const name = document.getElementById('r-name')?.value?.trim();
    const email = document.getElementById('r-email')?.value?.trim();
    const pass = document.getElementById('r-pass')?.value?.trim();
    const agree = document.getElementById('r-agree')?.checked;
    if (!name || !email || !pass || !agree) return toast('⚠️ Sab bharo aur agree karo');
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      await updateProfile(cred.user, { displayName: name });
      toast('✅ Account ban gaya!');
      setTimeout(() => showPage('home'), 1500);
    } catch (e) {
      toast('❌ ' + (e.code === 'auth/email-already-in-use' ? 'Email pehle se hai' : 'Registration failed'));
    }
  };

  // Delete post (sirf apne post pe)
  window.deletePost = async function(id) {
    try {
      await deleteDoc(doc(db, "posts", id));
      toast('🗑️ Post delete ho gaya!');
      showPage('home');
    } catch (e) {
      toast('❌ Delete nahi hua – permission check karo');
    }
  };

  // Baaki functions (showPage, openModal, submitToFirebase, openDetail etc.) 
  // tumhare purane code se copy-paste kar lena – yahan sirf fix wale parts diye hain
</script>

</body>
</html>
