<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>FindBack</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"><style>
body{
font-family: Arial, sans-serif;
background:#111;
color:#fff;
margin:0;
}

header{
background:#000;
padding:16px;
font-size:22px;
font-weight:700;
}

.container{
padding:20px;
}

input,textarea{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
}

button{
margin-top:10px;
padding:12px;
border:none;
background:#ff7a18;
color:white;
border-radius:10px;
font-weight:600;
cursor:pointer;
}

.card{
background:#222;
padding:12px;
border-radius:10px;
margin-top:10px;
}

</style></head><body><header>FindBack</header><div class="container"><h3>Report Lost / Found Item</h3><input id="item" placeholder="Item name"><textarea id="desc" placeholder="Description"></textarea><button onclick="submitPost()">Submit</button>

<h3 style="margin-top:30px">Posts</h3><div id="posts"></div></div><script>

let posts=[]

function submitPost(){

const item=document.getElementById("item").value
const desc=document.getElementById("desc").value

if(!item){
alert("Enter item name")
return
}

posts.push({item,desc})

render()

document.getElementById("item").value=""
document.getElementById("desc").value=""

}

function render(){

const container=document.getElementById("posts")

container.innerHTML=""

posts.forEach((p,i)=>{

container.innerHTML+=`
<div class="card">
<b>${p.item}</b>
<p>${p.desc}</p>
<button onclick="deletePost(${i})">Delete</button>
</div>
`

})

}

function deletePost(i){

posts.splice(i,1)

render()

}

</script></body>
</html>
