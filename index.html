<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FindBack S1 — Find what the world lost</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #E8722A;
      --black: #111111;
      --white: #FFFFFF;
      --gray: #F5F5F5;
      --text-muted: #777;
      --border: #E0E0E0;
      --card-bg: #FFFFFF;
      --input-bg: #FFFFFF;
      --toast-bg: #111111;
      --toast-text: #FFFFFF;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--white);
      color: var(--black);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background-color 0.4s, color 0.4s;
    }
    body.dark-mode {
      --orange: #FF9A5A;
      --black: #E0E0E0;
      --white: #1A1A1A;
      --gray: #2D2D2D;
      --text-muted: #AAAAAA;
      --border: #444444;
      --card-bg: #222222;
      --input-bg: #2A2A2A;
      --toast-bg: #222222;
      --toast-text: #E0E0E0;
    }
    nav {
      background: var(--black);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-logo {
      font-family: 'Sora', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      cursor: pointer;
    }
    .nav-logo span { color: var(--orange); }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .live-badge { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #aaa; }
    .live-dot { width: 7px; height: 7px; background: #4CAF50; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .s1-badge {
      background: var(--black);
      border: 1px solid #444;
      color: var(--white);
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
    }
    .btn-primary {
      background: var(--orange);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: opacity .2s;
    }
    .btn-primary:hover { opacity: .88; }
    .btn-outline {
      background: transparent;
      color: var(--orange);
      border: 2px solid var(--orange);
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-outline:hover { background: var(--orange); color: white; }
    .page { display: none; flex: 1; flex-direction: column; }
    .page.active { display: flex; }
    .page-content { padding: 32px 24px; flex: 1; max-width: 680px; width: 100%; margin: 0 auto; }
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--toast-bg);
      color: var(--toast-text);
      padding: 12px 20px;
      border-radius: 24px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: all .3s;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 300;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-sheet {
      background: var(--card-bg);
      border-radius: 20px 20px 0 0;
      padding: 24px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      color: var(--black);
    }
    .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
    .modal-title { font-family: 'Sora', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .modal-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
    .alert-success {
      background: #D1FAE5;
      color: #065F46;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 14px;
      margin-bottom: 16px;
    }
    body.dark-mode .alert-success {
      background: #064E3B;
      color: #6EE7B7;
    }
    .listing-card {
      border: 1.5px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      background: var(--card-bg);
      cursor: pointer;
      transition: box-shadow .2s;
    }
    body.dark-mode input,
    body.dark-mode textarea,
    body.dark-mode select {
      background: var(--input-bg);
      color: var(--black);
      border-color: var(--border);
    }
    #user-menu-container:hover #user-avatar {
      transform: scale(1.08);
      transition: transform 0.2s;
    }
    #user-dropdown button:hover {
      background: var(--gray);
    }
    /* Add your other original styles here (home-hero, page-content, etc.) */
  </style>
</head>
<body>

<nav>
  <div class="nav-logo" onclick="showPage('home')">Find<span>Back</span></div>
  <div class="nav-right">
    <div class="live-badge"><div class="live-dot"></div> Live</div>
    <div class="s1-badge">S1</div>

    <button id="nav-login-top" class="btn-primary" style="padding:8px 16px; font-size:13px;" onclick="showPage('login')">Login</button>

    <div id="user-menu-container" style="position:relative; display:none; cursor:pointer;">
      <div id="user-avatar" style="width:36px;height:36px;border-radius:50%;background:var(--orange);color:white;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.2);">
        U
      </div>
      <div id="user-dropdown" style="display:none;position:absolute;top:45px;right:0;background:var(--white);border:1px solid var(--border);border-radius:10px;box-shadow:0 6px 16px rgba(0,0,0,0.15);min-width:180px;z-index:100;overflow:hidden;">
        <button onclick="loadProfile()" style="width:100%;padding:12px 16px;border:none;background:none;text-align:left;cursor:pointer;font-size:14px;">👤 Profile</button>
        <button onclick="showMyPosts()" style="width:100%;padding:12px 16px;border:none;background:none;text-align:left;cursor:pointer;font-size:14px;">📋 My Posts</button>
        <button onclick="openSettingsModal()" style="width:100%;padding:12px 16px;border:none;background:none;text-align:left;cursor:pointer;font-size:14px;">⚙️ Settings</button>
        <div style="height:1px;background:var(--border);margin:4px 0;"></div>
        <button onclick="doLogout()" style="width:100%;padding:12px 16px;border:none;background:none;text-align:left;cursor:pointer;color:#dc2626;font-size:14px;">🚪 Logout</button>
      </div>
    </div>
  </div>
</nav>

<div class="toast" id="toast"></div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">⚙️ Settings</div>
    <div class="modal-sub">Customize your experience</div>

    <div style="padding:16px 0;">
      <div class="form-group">
        <label>🌙 Dark Mode</label>
        <select id="dark-mode-select" style="width:100%;padding:10px;border:1.5px solid var(--border);border-radius:10px;">
          <option value="system">System default</option>
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </div>
      <div class="form-group">
        <label>📧 Notifications</label>
        <div style="display:flex;align-items:center;gap:12px;">
          <input type="checkbox" id="notify-new-posts" checked>
          <label for="notify-new-posts" style="margin:0;font-size:14px;">Notify about matching posts</label>
        </div>
      </div>
      <div style="margin-top:24px;text-align:center;color:var(--text-muted);font-size:13px;">
        Account: <strong id="settings-email"></strong>
      </div>
    </div>

    <button class="btn-primary" style="width:100%;margin-top:16px;" onclick="saveSettings()">Save Settings</button>
    <button class="btn-outline" style="width:100%;margin-top:8px;" onclick="closeSettingsModal()">Close</button>
  </div>
</div>

<!-- Your other pages/modals (login, register, home, detail, report, edit etc.) go here -->
<!-- For brevity, only key parts shown. Paste your original page content here -->

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, orderBy, query, serverTimestamp, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCH1s6Cf2Zx2CZVv5HUUu2P7TwHEqoxWW8",
    authDomain: "findback-app-34e4f.firebaseapp.com",
    projectId: "findback-app-34e4f",
    storageBucket: "findback-app-34e4f.firebasestorage.app",
    messagingSenderId: "504207496092",
    appId: "1:504207496092:web:b9d6918639ed23ddad6e59"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window._currentUser = null;

  // =============================================
  // Dark Mode Logic
  // =============================================
  function applyDarkMode(mode) {
    if (mode === 'dark') {
      document.body.classList.add('dark-mode');
    } else if (mode === 'light') {
      document.body.classList.remove('dark-mode');
    } else { // system
      if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.body.classList.add('dark-mode');
      } else {
        document.body.classList.remove('dark-mode');
      }
    }
    localStorage.setItem('darkModePreference', mode);
  }

  // Load saved preference or system on start
  const savedMode = localStorage.getItem('darkModePreference') || 'system';
  applyDarkMode(savedMode);

  // Listen to system changes
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
    if (localStorage.getItem('darkModePreference') === 'system') {
      applyDarkMode('system');
    }
  });

  // =============================================
  // Auth & Avatar + Dropdown
  // =============================================
  onAuthStateChanged(auth, (user) => {
    window._currentUser = user;
    const loginBtn = document.getElementById('nav-login-top');
    const menuContainer = document.getElementById('user-menu-container');
    const avatar = document.getElementById('user-avatar');

    if (user) {
      loginBtn.style.display = 'none';
      menuContainer.style.display = 'block';
      const name = user.displayName || 'User';
      avatar.textContent = name.charAt(0).toUpperCase();
      avatar.onclick = toggleUserDropdown;
    } else {
      loginBtn.style.display = 'block';
      menuContainer.style.display = 'none';
    }
  });

  window.toggleUserDropdown = function() {
    const dropdown = document.getElementById('user-dropdown');
    dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
  };

  document.addEventListener('click', e => {
    if (!document.getElementById('user-menu-container')?.contains(e.target)) {
      document.getElementById('user-dropdown').style.display = 'none';
    }
  });

  // =============================================
  // Settings Modal
  // =============================================
  window.openSettingsModal = function() {
    document.getElementById('settings-email').textContent = window._currentUser?.email || 'N/A';
    document.getElementById('dark-mode-select').value = localStorage.getItem('darkModePreference') || 'system';
    document.getElementById('settings-modal').classList.add('open');
  };

  window.closeSettingsModal = function() {
    document.getElementById('settings-modal').classList.remove('open');
  };

  window.saveSettings = function() {
    const darkMode = document.getElementById('dark-mode-select').value;
    applyDarkMode(darkMode);
    toast('⚙️ Settings saved!');
    closeSettingsModal();
  };

  // =============================================
  // Logout
  // =============================================
  window.doLogout = async function() {
    await signOut(auth);
    toast('👋 Logged out!');
    showPage('home');
  };

  // Toast helper
  window.toast = function(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  };

  // Placeholder functions (add your original logic here)
  window.showPage = function(page) { /* your page switch logic */ };
  window.loadProfile = function() { /* your profile load */ };
  window.showMyPosts = function() { loadProfile(); /* or custom */ };
</script>

</body>
</html>
